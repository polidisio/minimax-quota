name: MiniMaxQuota
options:
  bundleIdPrefix: com.minimax
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  MiniMaxQuota:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minimax.MiniMaxQuota
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: MiniMaxQuota
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: MiniMaxQuota
        CFBundleDisplayName: MiniMaxQuota
        CFBundleIdentifier: com.minimax.MiniMaxQuota
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: MiniMaxQuota
        LSMinimumSystemVersion: "12.0"
        LSUIElement: true
